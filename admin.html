<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control - HonestWork</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-container { max-width: 1100px; margin: 40px auto; padding: 20px; }
        .admin-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: var(--shadow-md); }
        .admin-table th, .admin-table td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border-color); }
        .admin-table th { background: #2c3e50; color: white; }
        .btn-approve { background: var(--success-color); color: white; padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; margin-right: 5px; }
        .btn-reject { background: var(--danger-color); color: white; padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; }
        .id-link { color: var(--primary-color); font-weight: bold; text-decoration: underline; cursor: pointer; }
        .loading-msg { text-align: center; font-size: 1.2em; padding: 20px; }
    </style>
</head>
<body>
    <div class="admin-container">
        <header style="margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1>Panel de Verificación</h1>
                <p>Revisa y aprueba el acceso de nuevos trabajadores.</p>
            </div>
            <a href="index.html" class="btn-secondary" style="width: auto;">Volver al Inicio</a>
        </header>

        <div id="loading" class="loading-msg">Consultando base de datos...</div>

        <table class="admin-table" id="adminTable" style="display: none;">
            <thead>
                <tr>
                    <th>Trabajador</th>
                    <th>Oficio</th>
                    <th>Número ID</th>
                    <th>Documento</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="pendingList">
                </tbody>
        </table>
    </div>

    <script type="module" src="js/admin.js"></script>
</body>
</html>
