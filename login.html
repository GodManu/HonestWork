<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - HonestWork</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-container { max-width: 400px; margin: 80px auto; padding: 30px; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #eaeaea; }
        .login-container h2 { text-align: center; margin-bottom: 5px; }
        .login-container p { text-align: center; color: #666; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; font-size: 1em; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        .btn-login:hover { background: #0056b3; }
        .error-message { background: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: center; display: none; border: 1px solid #f5c6cb; font-size: 0.9em; }
        .register-link { text-align: center; margin-top: 20px; font-size: 0.9em; }
        .register-link a { color: #007bff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Bienvenido de nuevo</h2>
        <p>Ingresa a tu panel de HonestWork</p>

        <div id="loginError" class="error-message">
            Correo o contraseña incorrectos. Por favor, intenta de nuevo.
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="tu@correo.com">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-login">Ingresar</button>
        </form>

        <div class="register-link">
            ¿Aún no tienes cuenta o quieres ofrecer tus servicios? <br>
            <a href="register.html">Regístrate y verifícate aquí</a>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
