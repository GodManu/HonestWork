<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | HonestWork México</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #0056b3;
            --primary-dark: #003d82;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
            --white: #ffffff;
            --error: #ef4444;
            --radius: 24px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { 
            background-color: var(--bg-light); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: var(--white);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: 0 40px 80px rgba(0,0,0,0.06);
            border: 1px solid #f1f5f9;
            text-align: center;
        }

        .logo-box {
            background: var(--primary);
            color: white;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            font-weight: 800;
            font-size: 1rem;
            margin: 0 auto 25px;
        }

        .eyebrow {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
            margin-bottom: 10px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        p.subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 35px;
            font-weight: 500;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 8px;
            margin-left: 5px;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #cbd5e1;
            font-size: 0.9rem;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            outline: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(0, 86, 179, 0.05);
        }

        .btn-login {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 15px;
            border-radius: 100px;
            border: none;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(0, 86, 179, 0.15);
        }

        .btn-login:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(0, 86, 179, 0.25);
        }

        .footer-links {
            margin-top: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .footer-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }

        .back-home {
            margin-top: 25px;
            display: inline-block;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .back-home:hover { color: var(--primary); }

        #loginError {
            background: #fef2f2;
            color: var(--error);
            padding: 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-box">HW</div>
        <span class="eyebrow">Acceso Seguro</span>
        <h1>¡Hola de nuevo!</h1>
        <p class="subtitle">Ingresa a tu panel de HonestWork</p>

        <div id="loginError">Correo o contraseña incorrectos.</div>

        <form id="loginForm">
            <div class="form-group">
                <label>Correo Electrónico</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" placeholder="nombre@ejemplo.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-login" id="btnIngresar">
                Entrar al Panel
            </button>
        </form>

        <div class="footer-links">
            ¿No tienes cuenta? <a href="register.html">Regístrate aquí</a>
        </div>

        <a href="index.html" class="back-home">
            <i class="fa-solid fa-arrow-left"></i> Volver al inicio
        </a>
    </div>

    <script type="module">
        import { auth } from "./js/firebase-config.js";
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');
        const btnIngresar = document.getElementById('btnIngresar');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            btnIngresar.innerText = "Verificando...";
            btnIngresar.disabled = true;
            loginError.style.display = 'none';

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'profile.html';
            } catch (error) {
                console.error(error);
                loginError.style.display = 'block';
                btnIngresar.innerText = "Entrar al Panel";
                btnIngresar.disabled = false;
                
                // Limpiar contraseña por seguridad
                document.getElementById('password').value = "";
            }
        });
    </script>
</body>
</html>
