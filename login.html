<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | HonestWork</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #0056b3;
            --primary-dark: #003d82;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
            --white: #ffffff;
            --radius: 24px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { 
            background-color: var(--bg-light); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: var(--white);
            width: 100%;
            max-width: 450px;
            padding: 50px 40px;
            border-radius: var(--radius);
            box-shadow: 0 40px 80px rgba(0,0,0,0.06);
            border: 1px solid #f1f5f9;
            text-align: center;
        }

        .logo-box {
            background: var(--primary);
            color: white;
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            font-weight: 800;
            font-size: 1.2rem;
            margin: 0 auto 25px;
        }

        h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; }
        p.subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 35px; }

        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 800; color: var(--text-main); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; margin-left: 5px; }
        
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #cbd5e1; font-size: 1rem; }
        .input-wrapper input {
            width: 100%;
            padding: 16px 16px 16px 50px;
            border-radius: 18px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            outline: none;
            font-size: 0.95rem;
            font-weight: 600;
            transition: 0.3s;
        }
        .input-wrapper input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(0, 86, 179, 0.05); }

        .btn-submit { width: 100%; background: var(--primary); color: white; padding: 18px; border-radius: 100px; border: none; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 15px; transition: 0.3s; box-shadow: 0 10px 20px rgba(0, 86, 179, 0.15); }
        .btn-submit:hover { background: var(--primary-dark); transform: translateY(-2px); }

        .forgot-pass { display: block; text-align: right; font-size: 0.8rem; font-weight: 700; color: var(--primary); text-decoration: none; margin-top: 10px; cursor: pointer; }
        .footer-link { margin-top: 30px; font-size: 0.9rem; font-weight: 600; color: var(--text-muted); }
        .footer-link a { color: var(--primary); text-decoration: none; font-weight: 800; }

        /* MODAL RECUPERACIÓN */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-box { background: white; padding: 40px; border-radius: var(--radius); width: 90%; max-width: 450px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.2); animation: modalFade 0.3s ease-out; }
        @keyframes modalFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .btn-outline { background: transparent; border: 1px solid #e2e8f0; color: var(--text-muted); padding: 14px 25px; border-radius: 100px; font-weight: 700; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn-outline:hover { background: var(--bg-light); color: var(--text-main); }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-box">HW</div>
        <h1>Bienvenido de vuelta</h1>
        <p class="subtitle">Ingresa a tu panel de control profesional.</p>

        <form id="loginForm">
            <div class="form-group">
                <label>Correo Electrónico</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" placeholder="correo@ejemplo.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Tu contraseña" required>
                </div>
                <a class="forgot-pass" id="btnOpenRecovery">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="btn-submit" id="btnLogin">Acceder</button>
        </form>

        <div class="footer-link">
            ¿No tienes cuenta? <a href="register.html">Únete Gratis</a>
        </div>
    </div>

    <div class="modal-overlay" id="recoveryModal">
        <div class="modal-box">
            <div style="font-size: 2.5rem; color: var(--primary); margin-bottom: 15px;"><i class="fa-solid fa-key"></i></div>
            <h2 style="font-weight: 800; margin-bottom: 10px; letter-spacing: -1px;">Recuperar Contraseña</h2>
            <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 25px; line-height: 1.5;">Ingresa tu correo y te enviaremos un enlace seguro para crear una nueva contraseña.</p>
            
            <form id="recoveryForm">
                <div class="input-wrapper" style="margin-bottom: 20px;">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="recoveryEmail" placeholder="correo@ejemplo.com" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <button type="button" class="btn-outline" id="btnCloseRecovery">Cancelar</button>
                    <button type="submit" class="btn-submit" style="margin-top:0;" id="btnSendRecovery">Enviar Enlace</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { auth } from "./js/firebase-config.js";
        import { signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // LÓGICA DE LOGIN
        const loginForm = document.getElementById('loginForm');
        const btnLogin = document.getElementById('btnLogin');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            btnLogin.innerText = "Iniciando sesión...";
            btnLogin.disabled = true;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'profile.html';
            } catch (error) {
                alert("Correo o contraseña incorrectos.");
                btnLogin.innerText = "Acceder";
                btnLogin.disabled = false;
            }
        });

        // LÓGICA DE RECUPERACIÓN DE CONTRASEÑA
        const modal = document.getElementById('recoveryModal');
        document.getElementById('btnOpenRecovery').onclick = () => modal.style.display = 'flex';
        document.getElementById('btnCloseRecovery').onclick = () => modal.style.display = 'none';

        document.getElementById('recoveryForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('recoveryEmail').value.trim();
            const btnSend = document.getElementById('btnSendRecovery');
            
            btnSend.innerText = "Enviando...";
            btnSend.disabled = true;

            try {
                await sendPasswordResetEmail(auth, email);
                alert("¡Enlace enviado! Revisa tu bandeja de entrada (y la carpeta de SPAM).");
                modal.style.display = 'none';
                document.getElementById('recoveryForm').reset();
            } catch (error) {
                alert("Hubo un error o el correo no está registrado.");
            }
            btnSend.innerText = "Enviar Enlace";
            btnSend.disabled = false;
        };
    </script>
</body>
</html>
