<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Panel | HonestWork</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #0056b3;
            --primary-dark: #003d82;
            --accent: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
            --white: #ffffff;
            --radius: 24px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-main); }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 25px; }

        /* --- NAVBAR --- */
        .hw-header { 
            padding: 15px 0; 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px); 
            position: sticky; 
            top: 0; 
            z-index: 1000;
            border-bottom: 1px solid #f1f5f9;
        }
        .hw-nav { display: flex; justify-content: space-between; align-items: center; }
        .hw-logo { font-size: 1.2rem; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .logo-mark { background: var(--primary); color: white; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 0.7rem; }
        
        .btn-logout { background: none; border: none; font-size: 0.8rem; font-weight: 700; color: var(--text-muted); cursor: pointer; text-decoration: none; transition: 0.3s; }
        .btn-logout:hover { color: var(--danger); }

        /* --- GRID --- */
        .dashboard-grid { display: grid; grid-template-columns: 320px 1fr; gap: 30px; padding: 40px 0; }

        /* --- SIDEBAR --- */
        .sidebar-card { background: var(--white); border-radius: var(--radius); padding: 35px; text-align: center; border: 1px solid #f1f5f9; height: fit-content; box-shadow: 0 10px 20px rgba(0,0,0,0.03); }
        .profile-img { width: 140px; height: 140px; border-radius: 35px; object-fit: cover; margin-bottom: 20px; border: 5px solid var(--bg-light); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        .worker-name { font-size: 1.3rem; font-weight: 800; margin-bottom: 5px; letter-spacing: -1px; }
        .worker-job { font-size: 0.9rem; font-weight: 700; color: var(--primary); margin-bottom: 15px; }
        
        .verified-mini { font-size: 0.65rem; font-weight: 800; color: #10b981; background: #ecfdf5; padding: 5px 12px; border-radius: 100px; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 15px;}
        .sidebar-meta { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; margin-bottom: 20px; }
        .stars { color: var(--warning); font-size: 0.8rem; font-weight: 800; }

        /* --- CONTENT --- */
        .main-content { display: flex; flex-direction: column; gap: 30px; }
        .panel-card { background: var(--white); border-radius: var(--radius); padding: 35px; border: 1px solid #f1f5f9; box-shadow: 0 10px 20px rgba(0,0,0,0.03); }
        .eyebrow { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--primary); margin-bottom: 10px; display: block; }
        .section-title { font-size: 1.4rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 25px; }

        .status-banner { padding: 15px 20px; border-radius: 15px; font-size: 0.85rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .status-verified { background: #ecfdf5; color: #065f46; border: 1px solid #d1fae5; }
        .status-pending { background: #fffbeb; color: #92400e; border: 1px solid #fef3c7; }

        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .portfolio-item { position: relative; border-radius: 18px; overflow: hidden; border: 1px solid #eee; }
        .portfolio-item img { width: 100%; height: 150px; object-fit: cover; }
        .btn-delete-img { position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,0.9); border: none; color: var(--danger); width: 28px; height: 28px; border-radius: 8px; cursor: pointer; opacity: 0; transition: 0.3s; }
        .portfolio-item:hover .btn-delete-img { opacity: 1; }

        /* Botones */
        .btn { padding: 12px 25px; border-radius: 100px; font-weight: 700; cursor: pointer; text-decoration: none; border: none; font-size: 0.85rem; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 10px 20px rgba(0, 86, 179, 0.1); }
        .btn-outline { background: transparent; border: 1px solid #e2e8f0; color: var(--text-muted); }
        .btn-admin { background: #fff1f2; color: #991b1b; border: 1px solid #fecaca; margin-top: 15px; width: 100%; }

        /* Modales */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-box { background: white; padding: 40px; border-radius: 30px; width: 90%; max-width: 450px; box-shadow: 0 40px 80px rgba(0,0,0,0.1); }

        .form-control { width: 100%; padding: 14px; border-radius: 15px; border: 1px solid #e2e8f0; background: #f8fafc; outline: none; font-weight: 600; margin-top: 8px; margin-bottom: 20px; }

        @media (max-width: 900px) { .dashboard-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header class="hw-header">
        <div class="container hw-nav">
            <a href="index.html" class="hw-logo">
                <div class="logo-mark">HW</div> <span>HonestWork</span>
            </a>
            <button class="btn-logout" id="btnLogout"><i class="fa-solid fa-arrow-right-from-bracket"></i> Salir</button>
        </div>
    </header>

    <main class="container dashboard-grid">
        <aside class="sidebar-card">
            <div style="position: relative; display: inline-block;">
                <img src="https://via.placeholder.com/150" class="profile-img" id="userPhoto">
                <button class="btn btn-outline" style="position: absolute; bottom: 15px; right: 0; padding: 10px; border-radius: 50%; background: white;" id="btnEditPhoto">
                    <i class="fa-solid fa-camera"></i>
                </button>
                <input type="file" id="photoInput" style="display:none;" accept="image/*">
            </div>
            
            <h2 class="worker-name" id="userName">...</h2>
            <p class="worker-job" id="userJob">Oficio</p>
            <span class="verified-mini" id="idStatusBadge"><i class="fa-solid fa-certificate"></i> STATUS</span>
            <p class="sidebar-meta"><i class="fa-solid fa-location-dot"></i> <span id="userCity">Ciudad</span></p>
            <div class="stars" id="userRating">★★★★★ <span>0.0</span></div>

            <hr style="border: 0; border-top: 1px solid #f1f5f9; margin: 25px 0;">
            
            <button class="btn btn-outline" id="btnOpenEditModal" style="width: 100%;">
                <i class="fa-solid fa-user-pen"></i> Editar Perfil
            </button>

            <a href="admin.html" id="adminLink" class="btn btn-admin" style="display:none;">
                <i class="fa-solid fa-crown"></i> Panel Admin
            </a>
        </aside>

        <section class="main-content">
            <div id="statusBanner" class="status-banner status-pending">
                <i class="fa-solid fa-hourglass-half"></i> Verificando cuenta...
            </div>

            <div class="panel-card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                    <div>
                        <span class="eyebrow">Mi Portafolio</span>
                        <h2 class="section-title" style="margin:0;">Evidencia de Trabajos</h2>
                    </div>
                    <button class="btn btn-primary" id="btnOpenPortfolioModal"><i class="fa-solid fa-plus"></i> Añadir Foto</button>
                </div>
                <div class="portfolio-grid" id="workGallery">
                    <p style="text-align:center; grid-column:1/-1; color:#94a3b8;">Cargando portafolio...</p>
                </div>
            </div>

            <div class="panel-card">
                <span class="eyebrow">Reputación</span>
                <h2 class="section-title">Últimas Reseñas</h2>
                <div id="reviewsList">
                    <p style="color:#94a3b8;">Aún no tienes reseñas.</p>
                </div>
            </div>
        </section>
    </main>

    <div class="modal-overlay" id="editProfileModal">
        <div class="modal-box">
            <h2 style="margin-bottom:20px; letter-spacing:-1px;">Ajustes de Perfil</h2>
            <form id="editProfileForm">
                <label style="font-size:0.7rem; font-weight:800; color:var(--primary);">NOMBRE COMPLETO</label>
                <input type="text" id="editName" class="form-control" required>
                <label style="font-size:0.7rem; font-weight:800; color:var(--primary);">OFICIO</label>
                <input type="text" id="editJob" class="form-control" required>
                <label style="font-size:0.7rem; font-weight:800; color:var(--primary);">TELÉFONO WHATSAPP</label>
                <input type="text" id="editPhone" class="form-control">
                <label style="font-size:0.7rem; font-weight:800; color:var(--primary);">CIUDAD</label>
                <input type="text" id="editCity" class="form-control">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <button type="button" class="btn btn-outline" id="btnCloseEditModal">Cerrar</button>
                    <button type="submit" class="btn btn-primary" id="btnSaveProfile">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="portfolioModal">
        <div class="modal-box">
            <h2 style="margin-bottom:20px;">Nueva Evidencia</h2>
            <form id="portfolioForm">
                <label style="font-size:0.7rem; font-weight:800; color:var(--primary);">IMAGEN DEL TRABAJO</label>
                <input type="file" id="newWorkPhoto" accept="image/*" class="form-control" style="background:none; border:none; padding:0;" required>
                <label style="font-size:0.7rem; font-weight:800; color:var(--primary);">DESCRIPCIÓN</label>
                <input type="text" id="newWorkDescription" class="form-control" placeholder="Ej. Cambio de tubería en cocina" required>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <button type="button" class="btn btn-outline" id="btnClosePortfolioModal">Cancelar</button>
                    <button type="submit" class="btn btn-primary" id="btnSavePhoto">Subir Evidencia</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { auth, db, storage } from "./js/firebase-config.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc, updateDoc, arrayUnion, arrayRemove, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        let currentUserId = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserId = user.uid;
                
                // --- LLAVE MAESTRA ADMIN ---
                if (user.email === "serratoleyva@gmail.com") {
                    document.getElementById('adminLink').style.display = 'inline-flex';
                }

                loadDashboard(user.uid);
            } else {
                window.location.href = 'login.html';
            }
        });

        function loadDashboard(uid) {
            onSnapshot(doc(db, "users", uid), (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('userName').innerText = data.name || "Profesional";
                    document.getElementById('userJob').innerText = data.job || "Especialidad";
                    document.getElementById('userCity').innerText = data.city || "México";
                    document.getElementById('userPhoto').src = data.profilePhoto || "https://via.placeholder.com/150";
                    
                    const rating = parseFloat(data.rating || 0);
                    document.getElementById('userRating').innerHTML = "★".repeat(Math.round(rating)) + `☆`.repeat(5-Math.round(rating)) + ` <span>${rating.toFixed(1)}</span>`;

                    const banner = document.getElementById('statusBanner');
                    const badge = document.getElementById('idStatusBadge');
                    const btnUpload = document.getElementById('btnOpenPortfolioModal');

                    if (data.idStatus === "verificado") {
                        badge.innerHTML = `<i class="fa-solid fa-certificate"></i> VERIFICADO`;
                        badge.style.color = "#10b981"; badge.style.background = "#ecfdf5";
                        banner.className = "status-banner status-verified";
                        banner.innerHTML = `<i class="fa-solid fa-circle-check"></i> Tu perfil es público. ¡Ya eres visible en HonestWork!`;
                        btnUpload.disabled = false; btnUpload.style.opacity = "1";
                    } else {
                        badge.innerHTML = `<i class="fa-solid fa-hourglass-half"></i> PENDIENTE`;
                        banner.className = "status-banner status-pending";
                        banner.innerHTML = `<i class="fa-solid fa-shield-halved"></i> Manuel está revisando tu ID para activarte.`;
                        btnUpload.disabled = true; btnUpload.style.opacity = "0.5";
                    }

                    renderPortfolio(data.workPhotos || []);
                    renderReviews(data.reviews || []);
                }
            });
        }

        function renderPortfolio(photos) {
            const gallery = document.getElementById('workGallery');
            gallery.innerHTML = photos.length ? "" : '<p style="text-align:center; grid-column:1/-1;">No hay fotos aún.</p>';
            [...photos].reverse().forEach(p => {
                const div = document.createElement('div');
                div.className = 'portfolio-item';
                div.innerHTML = `<img src="${p.url}"><button class="btn-delete-img" onclick="deleteWorkPhoto('${p.path}','${p.url}','${p.description}')"><i class="fa-solid fa-trash"></i></button>`;
                gallery.appendChild(div);
            });
        }

        function renderReviews(reviews) {
            const list = document.getElementById('reviewsList');
            list.innerHTML = reviews.length ? "" : '<p>Sin reseñas.</p>';
            [...reviews].reverse().forEach(r => {
                list.innerHTML += `<div style="background:#f8fafc; padding:15px; border-radius:15px; margin-bottom:10px;">
                    <strong>${r.name}</strong> <span style="color:#f5b301;">${"⭐".repeat(r.rating)}</span>
                    <p style="font-size:0.85rem; margin-top:5px;">${r.comment}</p>
                </div>`;
            });
        }

        // --- MODALES ---
        const mEdit = document.getElementById('editProfileModal');
        const mPort = document.getElementById('portfolioModal');

        document.getElementById('btnOpenEditModal').onclick = () => mEdit.style.display = 'flex';
        document.getElementById('btnCloseEditModal').onclick = () => mEdit.style.display = 'none';
        document.getElementById('btnOpenPortfolioModal').onclick = () => mPort.style.display = 'flex';
        document.getElementById('btnClosePortfolioModal').onclick = () => mPort.style.display = 'none';

        document.getElementById('editProfileForm').onsubmit = async (e) => {
            e.preventDefault();
            await updateDoc(doc(db, "users", currentUserId), {
                name: document.getElementById('editName').value,
                job: document.getElementById('editJob').value,
                phone: document.getElementById('editPhone').value,
                city: document.getElementById('editCity').value
            });
            mEdit.style.display = 'none';
        };

        document.getElementById('portfolioForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSavePhoto');
            const file = document.getElementById('newWorkPhoto').files[0];
            const desc = document.getElementById('newWorkDescription').value;
            btn.innerText = "Subiendo..."; btn.disabled = true;

            const path = `public/${currentUserId}/works/${Date.now()}_${file.name}`;
            const sRef = ref(storage, path);
            await uploadBytes(sRef, file);
            const url = await getDownloadURL(sRef);

            await updateDoc(doc(db, "users", currentUserId), {
                workPhotos: arrayUnion({ url, description: desc, path })
            });
            mPort.style.display = 'none';
            btn.innerText = "Subir Evidencia"; btn.disabled = false;
        };

        window.deleteWorkPhoto = async (path, url, description) => {
            if(confirm("¿Eliminar foto?")) {
                await updateDoc(doc(db, "users", currentUserId), { workPhotos: arrayRemove({ url, description, path }) });
                await deleteObject(ref(storage, path));
            }
        };

        document.getElementById('btnEditPhoto').onclick = () => document.getElementById('photoInput').click();
        document.getElementById('photoInput').onchange = async (e) => {
            const file = e.target.files[0];
            const sRef = ref(storage, `profilePictures/${currentUserId}/profile.jpg`);
            await uploadBytes(sRef, file);
            const url = await getDownloadURL(sRef);
            await updateDoc(doc(db, "users", currentUserId), { profilePhoto: url });
        };

        document.getElementById('btnLogout').onclick = () => signOut(auth);
    </script>
</body>
</html>
