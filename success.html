<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Bienvenido a HonestPro! | HonestWork</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root {
            --primary: #0056b3;
            --primary-dark: #002b5c;
            --warning: #f59e0b;
            --text-main: #1e293b;
            --white: #ffffff;
            --radius: 30px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { 
            background-color: #f8fafc; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            overflow: hidden;
        }

        .success-card {
            background: var(--white);
            max-width: 500px;
            width: 90%;
            padding: 50px;
            border-radius: var(--radius);
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.08);
            border: 1px solid #f1f5f9;
            position: relative;
            z-index: 10;
        }

        .icon-box {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #f59e0b 0%, #92400e 100%);
            color: white;
            font-size: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 35px;
            margin: 0 auto 30px;
            box-shadow: 0 20px 40px rgba(245, 158, 11, 0.3);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 { font-size: 2rem; font-weight: 800; letter-spacing: -1.5px; color: var(--primary-dark); margin-bottom: 15px; }
        p { color: #64748b; line-height: 1.6; font-size: 1rem; margin-bottom: 35px; }

        .btn-back {
            background: var(--primary);
            color: white;
            padding: 18px 40px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            box-shadow: 0 15px 30px rgba(0, 86, 179, 0.2);
        }

        .btn-back:hover { 
            background: var(--primary-dark); 
            transform: scale(1.05);
            box-shadow: 0 20px 40px rgba(0, 86, 179, 0.3);
        }

        .loader {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--warning);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon-box">
            <i class="fa-solid fa-crown"></i>
        </div>
        <h1 id="greeting">¡Felicidades!</h1>
        <p>Tu suscripción a <strong>HonestPro</strong> ha sido activada con éxito. Ya tienes prioridad nacional en el directorio.</p>
        
        <div id="activationStatus" class="loader">Activando privilegios...</div>

        <div style="margin-top: 40px;">
            <a href="profile.html" class="btn-back">
                Ir a mi nuevo Panel Pro <i class="fa-solid fa-arrow-right"></i>
            </a>
        </div>
    </div>

    <script type="module">
        import { auth, db } from "./js/firebase-config.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Inicializar EmailJS
        emailjs.init("TU_PUBLIC_KEY"); // Manuel, pon aquí tu llave de EmailJS

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // 1. Lanzar confeti
                launchCelebration();

                try {
                    const userRef = doc(db, "users", user.uid);
                    const userSnap = await getDoc(userRef);
                    const userData = userSnap.data();

                    document.getElementById('greeting').innerText = `¡Felicidades, ${userData.name}!`;

                    // 2. Actualizar Firebase a PRO (Si no lo es todavía)
                    await updateDoc(userRef, {
                        membership: "pro",
                        activationDate: new Date().toISOString()
                    });

                    // 3. Enviar Correo de Bienvenida vía EmailJS
                    const emailParams = {
                        user_name: userData.name,
                        user_email: userData.email,
                        method: "Pago Digital (Stripe/PayPal)",
                        admin_email: "serratoleyva@gmail.com"
                    };

                    await emailjs.send("TU_SERVICE_ID", "TU_TEMPLATE_ID", emailParams);

                    document.getElementById('activationStatus').innerText = "✔️ Cuenta Pro Activada";
                    document.getElementById('activationStatus').style.color = "#10b981";

                } catch (error) {
                    console.error("Error activando cuenta:", error);
                    document.getElementById('activationStatus').innerText = "⚠️ Error en activación automática";
                }
            } else {
                // Si no hay sesión, mandarlos al login
                window.location.href = "login.html";
            }
        });

        function launchCelebration() {
            var duration = 3 * 1000;
            var end = Date.now() + duration;

            (function frame() {
              confetti({
                particleCount: 3,
                angle: 60,
                spread: 55,
                origin: { x: 0 },
                colors: ['#0056b3', '#f59e0b', '#10b981']
              });
              confetti({
                particleCount: 3,
                angle: 120,
                spread: 55,
                origin: { x: 1 },
                colors: ['#0056b3', '#f59e0b', '#10b981']
              });

              if (Date.now() < end) {
                requestAnimationFrame(frame);
              }
            }());
        }
    </script>
</body>
</html>
