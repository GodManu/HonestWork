<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Profesional - HonestWork</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .profile-container { max-width: 1000px; margin: 40px auto; padding: 20px; display: grid; grid-template-columns: 300px 1fr; gap: 30px; }
        .profile-card { background: white; padding: 30px; border-radius: 12px; border: 1px solid #eee; text-align: center; height: fit-content; position: sticky; top: 20px; }
        .profile-card img { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 4px solid var(--primary-color); }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .gallery-item { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; cursor: pointer; transition: transform 0.2s; }
        .gallery-item:hover { transform: scale(1.03); }
        .contact-btn { background: #25d366; color: white; padding: 12px; border: none; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; margin-top: 20px; }
        
        /* --- ESTILOS DEL BOTÓN --- */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #555;
            text-decoration: none;
            font-weight: bold;
            margin-bottom: 20px;
            padding: 10px 15px;
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 8px;
            transition: all 0.2s;
            grid-column: 1 / -1; 
            justify-self: start; 
        }

        .back-btn:hover {
            background: #e2e2e2;
            color: #000;
        }
        
        @media (max-width: 768px) {
            .profile-container { grid-template-columns: 1fr; }
            .profile-card { position: relative; top: 0; }
        }
    </style>
</head>
<body>

    <div class="profile-container">
        
        <a href="workers.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> Volver al Directorio
        </a>

        <aside class="profile-card">
            <img id="workerPhoto" src="https://via.placeholder.com/150" alt="Foto">
            <h2 id="workerName">Cargando...</h2>
            <p id="workerJob" style="color: #666; font-size: 1.1em;"></p>
            <div id="workerRating" style="color: #f5b301; margin: 10px 0; font-size: 1.2em;"></div>
            
            <a href="#" id="whatsappBtn" class="contact-btn">
                <i class="fa-brands fa-whatsapp"></i> Contactar por WhatsApp
            </a>
        </aside>

        <main>
            <div class="card" style="background: white; padding: 30px; border-radius: 12px; border: 1px solid #eee;">
                <h2>Portafolio de Trabajos</h2>
                <p>Fotos reales de proyectos realizados por este profesional.</p>
                <div id="workerGallery" class="gallery-grid">
                    </div>
            </div>

            <div class="card" style="margin-top: 20px; background: white; padding: 30px; border-radius: 12px; border: 1px solid #eee;">
                <h2>Reseñas de Clientes</h2>
                
                <div id="loginToReviewMessage" style="background: #fff3cd; padding: 20px; border-radius: 8px; border: 1px solid #ffeeba; text-align: center; margin-bottom: 30px;">
                    <p style="color: #856404; margin: 0 0 10px 0; font-weight: bold;">¿Contrataste a este profesional?</p>
                    <a href="login.html" style="background: #007bff; color: white; padding: 8px 15px; border-radius: 5px; text-decoration: none; font-weight: bold; display: inline-block;">Inicia sesión para dejar una reseña</a>
                </div>

               <div id="reviewFormSection" style="background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 30px; border: 1px solid #ddd; display: none;">
    <h3 style="margin-top:0; font-size: 1.1em;">Califica el servicio</h3>
    
    <p style="margin: 0; color: #555; font-size: 0.9em; padding-bottom: 10px;">Publicando como: <strong id="loggedInUserName">...</strong> ✔️</p>

    <div style="margin-bottom: 15px;">
        <label style="font-weight: bold; display: block; margin-bottom: 5px;">Calificación:</label>
        <select id="reviewRating" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
            <option value="5">⭐⭐⭐⭐⭐ (5) - Excelente</option>
            <option value="4">⭐⭐⭐⭐ (4) - Muy Bueno</option>
            <option value="3">⭐⭐⭐ (3) - Bueno</option>
            <option value="2">⭐⭐ (2) - Regular</option>
            <option value="1">⭐ (1) - Malo</option>
        </select>
    </div>

    <div style="margin-bottom: 15px;">
        <label style="font-weight: bold; display: block; margin-bottom: 5px;">Subir fotos del trabajo (Evidencia):</label>
        <input type="file" id="reviewPhotos" accept="image/*" multiple style="font-size: 0.9em;">
    </div>

    <div style="margin-bottom: 15px;">
        <label style="font-weight: bold; display: block; margin-bottom: 5px;">Tu Comentario:</label>
        <textarea id="reviewComment" placeholder="Describe el servicio recibido..." rows="3" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;"></textarea>
    </div>

    <div style="margin-bottom: 20px; background: #fff; padding: 10px; border-radius: 5px; border: 1px solid #ffccd5;">
        <label style="font-size: 0.85em; color: #721c24; cursor: pointer; display: flex; gap: 10px;">
            <input type="checkbox" id="confirmTruth" style="margin-top: 3px;">
            <span>Confirmo que esta reseña es real. Entiendo que subir información falsa o malintencionada resultará en la <strong>penalización o desactivación definitiva de mi cuenta</strong>.</span>
        </label>
    </div>

    <button id="btnSubmitReview" style="background: #007bff; color: white; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%;">
        Publicar Reseña Verificada
    </button>
</div>

                <div id="reviewsList" style="display: flex; flex-direction: column; gap: 15px;">
                    </div>
            </div>

        </main>
    </div>

    <script type="module" src="js/worker.js"></script>
</body>
</html>
