<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil del Trabajador - HonestWork</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-container { max-width: 800px; margin: 40px auto; padding: 20px; background: #fff; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-section { display: flex; gap: 20px; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 20px; }
        .header-section img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; }
        .info-section h2 { margin: 0 0 5px 0; }
        .job-title { color: #555; font-size: 1.2em; margin: 0 0 10px 0; }
        .verified-badge { background: #e8f5e9; color: #2e7d32; padding: 5px 10px; border-radius: 15px; font-size: 0.9em; font-weight: bold; display: inline-block; }
        .contact-btn { background: #25D366; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; margin-top: 15px; font-weight: bold; text-decoration: none; display: inline-block;}
        .contact-btn:hover { background: #1ebe57; }
        
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-bottom: 30px; }
        .gallery img { width: 100%; height: 150px; object-fit: cover; border-radius: 5px; }
        
        .review-card { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .review-stars { color: #f5b301; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="container" style="max-width: 1000px; margin: 0 auto; padding: 10px;">
        <a href="workers.html" style="color: #007bff; text-decoration: none;">← Volver al listado</a>
    </div>

    <div class="profile-container" id="workerProfile" style="display: none;">
        <div class="header-section">
            <img id="wPhoto" src="" alt="Foto del trabajador">
            <div class="info-section">
                <h2 id="wName">Nombre</h2>
                <p class="job-title" id="wJob">Oficio</p>
                <div class="verified-badge" id="wVerified">✔️ Identidad Verificada</div>
                <div style="margin-top: 10px; font-weight: bold;">
                    ⭐ <span id="wRating">0.0</span> (<span id="wReviewsCount">0</span> reseñas)
                </div>
                <a href="#" id="wContact" class="contact-btn">📱 Contactar por WhatsApp</a>
            </div>
        </div>

        <h3>Trabajos Anteriores</h3>
        <div class="gallery" id="wGallery">
            </div>

        <h3>Reseñas de Clientes</h3>
        <div id="wReviewsList">
            </div>
    </div>

    <div id="errorMessage" style="display: none; text-align: center; margin-top: 50px;">
        <h2>Trabajador no encontrado</h2>
        <p>El perfil que buscas no existe o fue eliminado por soporte.</p>
    </div>

    <script src="js/worker.js"></script>
</body>
</html>
