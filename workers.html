<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabajadores - HonestWork</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .search-bar input, .search-bar select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; flex: 1; min-width: 200px;}
        .workers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .worker-card { border: 1px solid #eee; border-radius: 8px; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); background: white; }
        .worker-card img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; }
        .verified-badge { color: green; font-size: 0.9em; font-weight: bold; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .rating { color: #f5b301; margin-bottom: 15px; font-weight: bold; }
        .btn-view { display: inline-block; padding: 8px 15px; background: #007bff; color: white; text-decoration: none; border-radius: 5px; transition: background 0.3s; }
        .btn-view:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 1000px; margin: 0 auto; padding: 20px;">
        <header style="text-align: center; margin-bottom: 30px;">
            <h2>Encuentra al profesional ideal</h2>
            <p>Perfiles verificados y recomendaciones reales.</p>
        </header>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Buscar por oficio o nombre...">
            <select id="ratingFilter">
                <option value="0">Cualquier calificación</option>
                <option value="4.5">Más de 4.5 estrellas</option>
                <option value="4.0">Más de 4.0 estrellas</option>
            </select>
        </div>

        <div class="workers-grid" id="workersContainer">
            </div>
    </div>

    <script src="js/workers.js"></script>
</body>
</html>
